name: Integration Test

# Reusable workflow that:
#   1. Builds all artifacts (calls build-artifacts.yml)
#   2. Generates a spread test matrix (opcli spread jobs)
#   3. Runs each spread test task in a dedicated job
#
# Call from your operator repository:
#
#   jobs:
#     integration-test:
#       uses: canonical/charm-ci/.github/workflows/integration-test.yml@main
#       permissions:
#         contents: read
#         packages: write
#         actions: read
#
# Assumptions about the operator repository layout:
#   - ``artifacts.yaml`` declares charms/rocks
#   - ``spread.yaml`` uses the ``integration-test:`` virtual backend
#   - ``tests/integration/`` contains the integration test modules

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing artifacts.yaml and spread.yaml (relative to workspace root)"
        type: string
        default: "."
      test-secret-1-name:
        description: "Name of secret #1 to pass to integration tests"
        type: string
        default: ""
      test-secret-2-name:
        description: "Name of secret #2 to pass to integration tests"
        type: string
        default: ""
      test-secret-3-name:
        description: "Name of secret #3 to pass to integration tests"
        type: string
        default: ""
      test-secret-4-name:
        description: "Name of secret #4 to pass to integration tests"
        type: string
        default: ""
      test-secret-5-name:
        description: "Name of secret #5 to pass to integration tests"
        type: string
        default: ""
      upload-image:
        description: "Rock upload mode passed to build-artifacts (registry or artifact)"
        type: string
        default: ""
      spread-jobs-include:
        description: "fnmatch pattern to include only matching spread jobs (e.g. 'my-backend-ci:*'). When empty all jobs are included."
        type: string
        default: ""
      pre-build-rock-script:
        description: "Optional shell command to run before building each rock. Passed to build-artifacts."
        type: string
        default: ""

jobs:
  # ── Job 1: build all artifacts ──────────────────────────────────────────────
  build:
    uses: ./.github/workflows/build-artifacts.yml
    with:
      working-directory: ${{ inputs.working-directory }}
      upload-image: ${{ inputs.upload-image }}
      pre-build-rock-script: ${{ inputs.pre-build-rock-script }}
    permissions:
      contents: read
      packages: write
      actions: read

  # ── Job 2: generate the spread test matrix ──────────────────────────────────
  # Runs in parallel with the build job — only needs spread.yaml from the repo.
  test-matrix:
    name: Test matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      opcli-sha: ${{ steps.workflow-version.outputs.sha }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get workflow version
        id: workflow-version
        uses: canonical/get-workflow-version-action@v1
        with:
          repository-name: canonical/charm-ci
          file-name: integration-test.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        run: sudo snap install astral-uv --classic

      - name: Install opcli
        run: |
          if grep -q 'name = "opcli"' "${GITHUB_WORKSPACE}/pyproject.toml" 2>/dev/null; then
            uv tool install "opcli[cli] @ ${GITHUB_WORKSPACE}"
          else
            uv tool install "opcli[cli] @ git+https://github.com/canonical/charm-ci.git@${{ steps.workflow-version.outputs.sha }}"
          fi

      - name: Install spread
        run: |
          sudo snap install go --classic
          go install github.com/canonical/spread/cmd/spread@latest
          sudo ln -sf ~/go/bin/spread /usr/local/bin/spread

      - name: Generate test matrix
        id: matrix
        run: |
          args=()
          if [ -n "${{ inputs.spread-jobs-include }}" ]; then
            args+=(--include "${{ inputs.spread-jobs-include }}")
          fi
          matrix=$(opcli spread jobs "${args[@]}")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Test matrix: $matrix"

  # ── Job 3: run each spread task ─────────────────────────────────────────────
  # Starts as soon as test-matrix finishes — does NOT wait for the build job.
  # Provisioning runs in parallel with the build.  The spread _CI_PREPARE script
  # waits for and downloads the build artifacts before executing tests.
  test:
    name: "${{ matrix.name }}"
    needs: [test-matrix]
    runs-on: ${{ fromJSON(matrix.runs-on) }}
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.test-matrix.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up tmate session (self-hosted)
        if: runner.debug == 1 && runner.environment == 'self-hosted'
        uses: canonical/action-tmate@main
        with:
          detached: true
          timeout-minutes: 60

      - name: Set up tmate session (GitHub-hosted)
        if: runner.debug == 1 && runner.environment == 'github-hosted'
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true

      - name: Install uv
        run: sudo snap install astral-uv --classic

      - name: Install opcli
        run: |
          if grep -q 'name = "opcli"' "${GITHUB_WORKSPACE}/pyproject.toml" 2>/dev/null; then
            uv tool install "opcli[cli] @ ${GITHUB_WORKSPACE}"
          else
            uv tool install "opcli[cli] @ git+https://github.com/canonical/charm-ci.git@${{ needs.test-matrix.outputs.opcli-sha }}"
          fi

      # ── Install spread ────────────────────────────────────────────────────
      - name: Install spread
        run: |
          sudo snap install go --classic
          go install github.com/canonical/spread/cmd/spread@latest
          sudo ln -sf ~/go/bin/spread /usr/local/bin/spread

      # ── Export test secrets ─────────────────────────────────────────────
      # Only the secrets named in test-secret-{1..5}-name inputs are extracted.
      # ALL_SECRETS contains the full JSON so we can look up dynamic names, but
      # only the explicitly requested values are exported to the environment.
      - name: Export test secrets
        if: >-
          inputs.test-secret-1-name != '' ||
          inputs.test-secret-2-name != '' ||
          inputs.test-secret-3-name != '' ||
          inputs.test-secret-4-name != '' ||
          inputs.test-secret-5-name != ''
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          set -euo pipefail
          for name in \
            "${{ inputs.test-secret-1-name }}" \
            "${{ inputs.test-secret-2-name }}" \
            "${{ inputs.test-secret-3-name }}" \
            "${{ inputs.test-secret-4-name }}" \
            "${{ inputs.test-secret-5-name }}"; do
            if [ -z "$name" ]; then continue; fi
            value=$(echo "$ALL_SECRETS" | jq -r --arg k "$name" '.[$k] // empty')
            if [ -z "$value" ]; then
              echo "::warning::Secret '$name' not found or empty"
              continue
            fi
            echo "::add-mask::$value"
            echo "$name=$value" >> "$GITHUB_ENV"
          done
          # Defensive: step-level env: vars don't persist to later steps, but
          # explicitly unset to minimize in-process exposure window.
          unset ALL_SECRETS

      # ── Early bail-out if the build already failed ─────────────────────────
      # The test job starts without waiting for the build (by design — provisioning
      # runs in parallel).  However, if the build has already failed by the time we
      # reach this point, there is no reason to continue.  The "Collect artifacts"
      # job in the build workflow is skipped/failed/cancelled when a build fails,
      # so we use its conclusion as the signal.
      - name: Abort if build failed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          conclusion=$(gh run view "${{ github.run_id }}" \
            --repo "${{ github.repository }}" \
            --json jobs \
            --jq '.jobs[] | select(.name | contains("Collect artifacts")) | .conclusion')
          if [[ "$conclusion" =~ ^(skipped|failure|cancelled)$ ]]; then
            echo "::error::Build failed — 'Collect artifacts' job conclusion is '$conclusion'. Skipping test."
            exit 1
          fi

      # ── Fix LXD+Docker connectivity ─────────────────────────────────────
      # Docker sets the FORWARD policy to DROP and filters via the DOCKER-USER
      # chain, which blocks LXD bridge traffic.  Insert allow rules for lxdbr0
      # into the chain (if it exists) rather than resetting the global policy.
      # See https://documentation.ubuntu.com/lxd/latest/howto/network_bridge_firewalld/#network-lxd-docker
      - name: Fix LXD+Docker forwarding
        run: |
          sudo iptables -P FORWARD ACCEPT
          if sudo iptables -nL DOCKER-USER 2>/dev/null; then
            sudo iptables -I DOCKER-USER -i lxdbr0 -j ACCEPT
            sudo iptables -I DOCKER-USER -o lxdbr0 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
          fi
          if sudo ip6tables -nL DOCKER-USER 2>/dev/null; then
            sudo ip6tables -I DOCKER-USER -i lxdbr0 -j ACCEPT
            sudo ip6tables -I DOCKER-USER -o lxdbr0 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
          fi

      # ── Run the spread task ───────────────────────────────────────────────
      # Artifact download happens inside spread _CI_PREPARE (after provisioning).
      - name: Run spread task
        env:
          CI: "true"
          # GITHUB_TOKEN must be explicit — it is not auto-exported by Actions.
          # Spread captures it via $(HOST: echo "${GITHUB_TOKEN:-}") and the
          # _CI_PREPARE script uses it to authenticate `gh run download`.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Forward the pinned opcli SHA so the spread prepare script installs
          # the same version as the runner (falls back to @main otherwise).
          OPCLI_GIT_REF: ${{ needs.test-matrix.outputs.opcli-sha }}
        run: opcli spread run -- -vv ${{ matrix.selector }}

      - name: Juju status (on failure)
        if: failure()
        run: |
          sudo -u ubuntu bash -c '
            juju models --format json | jq -r ".models[].\"short-name\"" | while IFS= read -r model; do
              echo "=== juju status for model: $model ==="
              juju status -m "$model" --relations --storage || true
            done
          '

      - name: Juju debug-log (on failure)
        if: failure()
        run: sudo -u ubuntu juju debug-log --replay
