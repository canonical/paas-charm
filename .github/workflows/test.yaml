name: Tests

on:
  pull_request:

jobs:
  unit-tests:
    uses: canonical/operator-workflows/.github/workflows/test.yaml@main
    secrets: inherit
    with:
      pre-run-script: scripts/install_charmcraft.sh
      charmcraft-channel: latest/edge
      self-hosted-runner: false
      self-hosted-runner-label: "edge"
      with-uv: true
