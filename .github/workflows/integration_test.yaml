name: Integration tests

on:
  pull_request:
  schedule:
  - cron: "0 15 * * SAT"

jobs:
  integration-tests:
    permissions:
      packages: write
      pull-requests: write
    strategy:
      matrix:
        juju-version: [3.6/stable]
    uses: 
      canonical/operator-workflows/.github/workflows/integration_test.yaml@main
    secrets: inherit
    with:
      provider: k8s
      extra-arguments: '-x --log-format="%(asctime)s %(levelname)s %(message)s"'
      use-canonical-k8s: true
      charmcraft-channel: latest/edge
      modules: |
        [
          "test_charm.py",
          "test_flask_configs.py",
          "test_config.py",
          "test_database.py",
          "test_db_migration.py",
          "test_django.py",
          "test_django_integrations.py",
          "test_expressjs.py",
          "test_fastapi.py",
          "test_go.py",
          "test_grafana.py",
          "test_http_proxy.py",
          "test_ingress_django.py",
          "test_ingress_expressjs.py",
          "test_ingress_fastapi.py",
          "test_ingress_flask.py",
          "test_ingress_go.py",
          "test_ingress_springboot.py",
          "test_loki.py",
          "test_minimal.py",
          "test_non_root_db_migration.py",
          "test_non_root_loki.py",
          "test_oauth.py",
          "test_openfga.py",
          "test_prometheus.py",
          "test_proxy.py",
          "test_rabbitmq.py",
          "test_s3.py",
          "test_saml.py",
          "test_smtp.py",
          "test_tracing.py",
          "test_workers.py",
          "test_spring_saml.py",
          "test_redis.py",
          "test_mongodb.py",
          "test_mysql.py",
          "test_valkey.py"
        ]
      rockcraft-channel: latest/edge
      juju-channel: ${{ matrix.juju-version }}
      channel: 1.34-classic/stable
      test-timeout: 45
  allure-report:
    if: ${{ !cancelled() && github.event_name == 'schedule' }}
    needs:
    - integration-tests
    uses: canonical/operator-workflows/.github/workflows/allure_report.yaml@main
