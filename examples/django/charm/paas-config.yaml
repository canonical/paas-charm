port: 8080
framework_logging_format: json
prometheus:
  scrape_configs:
  - job_name: app-custom
    metrics_path: /metrics
    static_configs:
    - labels:
        app: flask
        env: example
      targets:
      - '*:8081'
  - job_name: app-scheduler-metrics
    metrics_path: /metrics
    static_configs:
    - labels:
        role: scheduler
      targets:
      - '@scheduler:8082'
