name: go-valkey-k8s
summary: Test Go charm for valkey_client interface.
description: A test Go charm to validate valkey_client support in the 12-factor framework.
base: ubuntu@24.04
platforms:
  amd64:
parts:
  charm:
    plugin: charm
    source: .
    charm-python-packages:
      - dpcharmlibs-interfaces
    build-snaps:
      - rustup
    override-build: |-
      rustup default stable
      craftctl default
type: charm
charm-libs:
  - lib: traefik-k8s.ingress
    version: "2"
  - lib: observability-libs.juju_topology
    version: "0"
  - lib: grafana-k8s.grafana_dashboard
    version: "0"
  - lib: loki-k8s.loki_push_api
    version: "1"
  - lib: data-platform-libs.data_interfaces
    version: "0"
  - lib: prometheus-k8s.prometheus_scrape
    version: "0"
  - lib: redis-k8s.redis
    version: "0"
  - lib: data-platform-libs.s3
    version: "0"
  - lib: saml-integrator.saml
    version: "0"
  - lib: tempo-coordinator-k8s.tracing
    version: "0"
  - lib: smtp-integrator.smtp
    version: "0"
  - lib: openfga-k8s.openfga
    version: "1"
  - lib: hydra.oauth
    version: "0"
  - lib: squid-forward-proxy.http_proxy
    version: "0"
actions:
  rotate-secret-key:
    description: Rotate the secret key.
assumes:
  - k8s-api
containers:
  app:
    resource: app-image
peers:
  secret-storage:
    interface: secret-storage
provides:
  metrics-endpoint:
    interface: prometheus_scrape
  grafana-dashboard:
    interface: grafana_dashboard
requires:
  valkey:
    interface: valkey_client
    optional: true
    limit: 1
  logging:
    interface: loki_push_api
  ingress:
    interface: ingress
    limit: 1
resources:
  app-image:
    type: oci-image
    description: Go application image.
config:
  options:
    app-port:
      type: int
      default: 8080
      description: Default port where the application will listen on.
    metrics-port:
      type: int
      default: 8080
      description: Port where the prometheus metrics will be scraped.
    metrics-path:
      type: string
      default: /metrics
      description: Path where the prometheus metrics will be scraped.
    app-secret-key:
      type: string
      description: Long secret you can use for sessions, csrf or any other thing where you need a random secret shared by all units.
    app-secret-key-id:
      type: secret
      description: This configuration is similar to app-secret-key, but instead accepts a Juju user secret ID.
