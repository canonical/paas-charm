framework_logging_format: json
metrics_port: 9102
metrics_path: /metrics
prometheus:
  scrape_configs:
    # Custom job scraping all units on port 8081
    - job_name: "flask-custom-metrics"
      metrics_path: "/metrics"
      static_configs:
        - targets:
            - "*:8081"  # Additional endpoint independent from metrics_port
          labels:
            app: "flask"
            env: "example"
    
    # Scheduler-only job using @scheduler placeholder
    - job_name: "flask-scheduler-metrics"
      metrics_path: "/metrics"
      static_configs:
        - targets:
            - "@scheduler:8082"  # Only scrapes scheduler unit (unit 0)
          labels:
            role: "scheduler"
