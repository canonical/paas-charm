name: test-db-flask
title: test-db-flask
version: '0.1'
summary: Default Flask application image.
description: Default Flask application image.
base: ubuntu@22.04
platforms:
  amd64:
    build-on:
    - amd64
    build-for:
    - amd64
license: Apache-2.0
parts:
  flask-framework/install-app:
    prime:
    - -flask/app/requirements.txt
    plugin: dump
    source: .
    organize:
      alembic: flask/app/alembic
      alembic.ini: flask/app/alembic.ini
      app.py: flask/app/app.py
      migrate.sh: flask/app/migrate.sh
      requirements.txt: flask/app/requirements.txt
      rockcraft.yaml: flask/app/rockcraft.yaml
    stage:
    - flask/app/alembic
    - flask/app/alembic.ini
    - flask/app/app.py
    - flask/app/migrate.sh
    - flask/app/requirements.txt
    - flask/app/rockcraft.yaml
    permissions:
    - owner: 584792
      group: 584792
  flask-framework/dependencies:
    plugin: python
    stage-packages:
    - python3-venv
    source: .
    python-packages:
    - gunicorn~=23.0
    python-requirements:
    - requirements.txt
    build-environment: []
  flask-framework/config-files:
    plugin: dump
    source: /snap/rockcraft/4238/share/rockcraft/extensions/flask-framework
    organize:
      gunicorn.conf.py: flask/gunicorn.conf.py
    permissions:
    - path: flask/gunicorn.conf.py
      owner: 584792
      group: 584792
  flask-framework/statsd-exporter:
    build-snaps:
    - go
    source-tag: v0.29.0
    plugin: go
    source: https://github.com/prometheus/statsd_exporter.git
  flask-framework/logging:
    plugin: nil
    override-build: |-
      craftctl default
      mkdir -p $CRAFT_PART_INSTALL/opt/promtail
      mkdir -p $CRAFT_PART_INSTALL/etc/promtail
      mkdir -p $CRAFT_PART_INSTALL/var/log/flask
    permissions:
    - path: opt/promtail
      owner: 584792
      group: 584792
    - path: etc/promtail
      owner: 584792
      group: 584792
    - path: var/log/flask
      owner: 584792
      group: 584792
  flask-framework/runtime:
    plugin: nil
    stage-packages:
    - ca-certificates_data
run-user: _daemon_
services:
  flask:
    override: replace
    command: /bin/python3 -m gunicorn -c /flask/gunicorn.conf.py app:app -k [ sync
      ]
    startup: enabled
    after:
    - statsd-exporter
    user: _daemon_
  statsd-exporter:
    override: merge
    command: /bin/statsd_exporter --statsd.mapping-config=/statsd-mapping.conf --statsd.listen-udp=localhost:9125
      --statsd.listen-tcp=localhost:9125
    summary: statsd exporter service
    startup: enabled
    user: _daemon_
