# YAML configuration for opcli spread backend
# Defines test suites and concierge environments for paas-charm

backends:
  integration-test:
    summary: paas-charm integration test environments
    type: manual
    config:
      concierge: microk8s

integration-suites:
  tests/integration/:
    working-dir: ./
    summary: paas-charm integration tests
    auto-discover: false
    backends:
      - integration-test
    environment:
      # Flask tests (6 modules)
      MODULE/flask_test_charm: tests/integration/flask/test_charm.py
      MODULE/flask_test_database: tests/integration/flask/test_database.py
      MODULE/flask_test_db_migration: tests/integration/flask/test_db_migration.py
      MODULE/flask_test_flask_configs: tests/integration/flask/test_flask_configs.py
      MODULE/flask_test_proxy: tests/integration/flask/test_proxy.py
      MODULE/flask_test_workers: tests/integration/flask/test_workers.py
      
      # Django tests (3 modules)
      MODULE/django_test_django: tests/integration/django/test_django.py
      MODULE/django_test_django_integrations: tests/integration/django/test_django_integrations.py
      MODULE/django_test_workers: tests/integration/django/test_workers.py
      
      # FastAPI tests (1 module)
      MODULE/fastapi_test_fastapi: tests/integration/fastapi/test_fastapi.py
      
      # Go tests (1 module)
      MODULE/go_test_go: tests/integration/go/test_go.py
      
      # ExpressJS tests (1 module)
      MODULE/expressjs_test_expressjs: tests/integration/expressjs/test_expressjs.py
      
      # SpringBoot tests (2 modules)
      MODULE/springboot_test_charm: tests/integration/springboot/test_charm.py
      MODULE/springboot_test_spring_saml: tests/integration/springboot/test_spring_saml.py
      
      # General tests (3 modules)
      MODULE/general_test_config: tests/integration/general/test_config.py
      MODULE/general_test_non_root_db_migration: tests/integration/general/test_non_root_db_migration.py
      MODULE/general_test_non_root_loki: tests/integration/general/test_non_root_loki.py
      
      # Integration tests (13 modules - excludes valkey)
      MODULE/integrations_test_grafana: tests/integration/integrations/test_grafana.py
      MODULE/integrations_test_http_proxy: tests/integration/integrations/test_http_proxy.py
      MODULE/integrations_test_loki: tests/integration/integrations/test_loki.py
      MODULE/integrations_test_minimal: tests/integration/integrations/test_minimal.py
      MODULE/integrations_test_mongodb: tests/integration/integrations/test_mongodb.py
      MODULE/integrations_test_mysql: tests/integration/integrations/test_mysql.py
      MODULE/integrations_test_oauth: tests/integration/integrations/test_oauth.py
      MODULE/integrations_test_openfga: tests/integration/integrations/test_openfga.py
      MODULE/integrations_test_prometheus: tests/integration/integrations/test_prometheus.py
      MODULE/integrations_test_rabbitmq: tests/integration/integrations/test_rabbitmq.py
      MODULE/integrations_test_redis: tests/integration/integrations/test_redis.py
      MODULE/integrations_test_s3: tests/integration/integrations/test_s3.py
      MODULE/integrations_test_saml: tests/integration/integrations/test_saml.py
      MODULE/integrations_test_smtp: tests/integration/integrations/test_smtp.py
      MODULE/integrations_test_tracing: tests/integration/integrations/test_tracing.py

concierges:
  microk8s:
    path: concierge-microk8s.yaml
