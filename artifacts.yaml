# YAML configuration for paas-charm artifacts (charms + rocks)
# Generated by opcli artifacts build

charms:
  flask-k8s:
    dir: examples/flask/charm
    resources:
      app-image:
        rocks:
          - test-flask
          - test-async-flask
          - test-db-flask
  flask-minimal-k8s:
    dir: examples/flask-minimal/charm
    resources:
      app-image:
        rocks:
          - flask-minimal-app
  django-k8s:
    dir: examples/django/charm
    resources:
      app-image:
        rocks:
          - django-app
          - django-async-app
  expressjs-k8s:
    dir: examples/expressjs/charm
    resources:
      app-image:
        rocks:
          - expressjs-app
  fastapi-k8s:
    dir: examples/fastapi/charm
    resources:
      app-image:
        rocks:
          - fastapi-app
  go-k8s:
    dir: examples/go/charm
    resources:
      app-image:
        rocks:
          - go-app
  spring-boot-k8s:
    dir: examples/springboot/charm
    resources:
      app-image:
        rocks:
          - paas-spring-boot-app

rocks:
  test-flask:
    dir: examples/flask/test_rock
  test-async-flask:
    dir: examples/flask/test_async_rock
  test-db-flask:
    dir: examples/flask/test_db_rock
  flask-minimal-app:
    dir: examples/flask-minimal/flask_minimal_app
  django-app:
    dir: examples/django/django_app
  django-async-app:
    dir: examples/django/django_async_app
  expressjs-app:
    dir: examples/expressjs
  fastapi-app:
    dir: examples/fastapi/fastapi_app
  go-app:
    dir: examples/go/go_app
  paas-spring-boot-app:
    dir: examples/springboot/spring-boot_app

platforms:
  - arch: amd64
